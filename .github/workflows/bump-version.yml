# Bump semver, refresh README What's New, tag, and push.
# Does NOT build or publish binaries — players clone and `cargo run`.
name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Preview only (no commit, tag, or push)
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preview bump
        if: inputs.dry_run
        run: python scripts/bump_release.py --bump "${{ inputs.bump }}"

      - name: Apply bump
        if: ${{ !inputs.dry_run }}
        id: release
        run: python scripts/bump_release.py --bump "${{ inputs.bump }}" --write --print-version

      - name: Commit version files
        if: ${{ !inputs.dry_run && steps.release.outputs.skip_writes != 'true' }}
        env:
          NEW_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md
          if git diff --staged --quiet; then
            echo "No staged changes after bump script"
            exit 1
          fi
          git commit -m "chore(release): v${NEW_VERSION}"
          git push

      - name: Tag release
        if: ${{ !inputs.dry_run }}
        env:
          NEW_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${NEW_VERSION} already exists — skipping tag push"
          else
            git tag -a "v${NEW_VERSION}" -m "rust-quest v${NEW_VERSION}"
            git push origin "v${NEW_VERSION}"
          fi

      - name: Already synced summary
        if: ${{ !inputs.dry_run && steps.release.outputs.skip_writes == 'true' }}
        env:
          NEW_VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "Version v${NEW_VERSION} already present in Cargo.toml and README.md — no file edits."
